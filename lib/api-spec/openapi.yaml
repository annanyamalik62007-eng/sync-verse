openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SYNCVERSE AI - Real-time campus connection engine
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: Student profiles and current intent
  - name: matches
    description: Live match detection
  - name: squads
    description: Auto-formed squads
  - name: signals
    description: Live campus signals and feed
  - name: insights
    description: Community insights and FOMO triggers
  - name: messages
    description: Direct messages between matched students
  - name: events
    description: Per-college events and RSVPs
  - name: campus
    description: College and major hubs
  - name: posts
    description: Community posts within zones with reactions and joins
  - name: ai
    description: Claude-powered icebreakers and squad pitches
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all active students
      parameters:
        - in: query
          name: zone
          required: false
          schema:
            $ref: "#/components/schemas/CommunityZone"
        - in: query
          name: college
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create or update the current user (drop into the ecosystem)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a single student
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update fields on the current student (e.g. profile photo)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/matches:
    get:
      operationId: getMatchesForUser
      tags: [matches]
      summary: Top live matches for a user (3-5)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /squads:
    get:
      operationId: listSquads
      tags: [squads]
      summary: List active squads
      responses:
        "200":
          description: Squads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Squad"

  /users/{userId}/squad-suggestions:
    get:
      operationId: getSquadSuggestionsForUser
      tags: [squads]
      summary: AI-generated squad suggestions for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggested squads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Squad"

  /squads/{squadId}/join:
    post:
      operationId: joinSquad
      tags: [squads]
      summary: Join a squad
      parameters:
        - in: path
          name: squadId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinSquadInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Squad"

  /signals:
    get:
      operationId: listLiveSignals
      tags: [signals]
      summary: Real-time campus feed signals
      parameters:
        - in: query
          name: college
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /insights/community:
    get:
      operationId: getCommunityInsights
      tags: [insights]
      summary: Community-wide insights (trending, active zones, common needs)
      parameters:
        - in: query
          name: college
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityInsights"

  /insights/fomo:
    get:
      operationId: getFomoTriggers
      tags: [insights]
      summary: FOMO trigger messages
      parameters:
        - in: query
          name: college
          required: false
          schema:
            type: string
      responses:
        "200":
          description: FOMO triggers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FomoTrigger"

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a direct message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /users/{userId}/threads:
    get:
      operationId: listThreadsForUser
      tags: [messages]
      summary: List recent message threads for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thread previews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageThread"

  /users/{meId}/messages/{otherId}:
    get:
      operationId: listMessagesBetween
      tags: [messages]
      summary: Full message history between two users
      parameters:
        - in: path
          name: meId
          required: true
          schema:
            type: string
        - in: path
          name: otherId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List upcoming events (optionally filtered by college)
      parameters:
        - in: query
          name: college
          required: false
          schema:
            type: string
        - in: query
          name: userId
          required: false
          description: When provided, each event includes whether this user has RSVPed
          schema:
            type: string
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampusEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Host a new event for your college
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampusEvent"

  /events/{eventId}/rsvp:
    post:
      operationId: toggleEventRsvp
      tags: [events]
      summary: Toggle RSVP for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampusEvent"

  /majors/hub:
    get:
      operationId: getMajorHub
      tags: [campus]
      summary: People and stats for a single major
      parameters:
        - in: query
          name: major
          required: true
          schema:
            type: string
        - in: query
          name: college
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Major hub
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MajorHub"

  /college/{college}/snapshot:
    get:
      operationId: getCollegeSnapshot
      tags: [campus]
      summary: Snapshot of activity at a college
      parameters:
        - in: path
          name: college
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollegeSnapshot"

  /zones/{zone}/posts:
    get:
      operationId: listZonePosts
      tags: [posts]
      summary: List recent posts in a zone
      parameters:
        - in: path
          name: zone
          required: true
          schema:
            $ref: "#/components/schemas/CommunityZone"
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /users/{userId}/posts:
    get:
      operationId: listUserPosts
      tags: [posts]
      summary: List posts authored by a user (Instagram-like profile feed)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts:
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post in a zone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}/react:
    post:
      operationId: togglePostReaction
      tags: [posts]
      summary: Toggle a reaction (fire/heart/clap) on a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}/join:
    post:
      operationId: togglePostJoin
      tags: [posts]
      summary: Toggle joining the activity in a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /insights/zones:
    get:
      operationId: getZoneActivity
      tags: [insights]
      summary: Live activity counts per community zone
      responses:
        "200":
          description: Zone activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneActivity"

  /ai/icebreaker:
    post:
      operationId: generateIcebreaker
      tags: [ai]
      summary: Generate a single AI icebreaker between two matched users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcebreakerInput"
      responses:
        "200":
          description: Generated icebreaker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcebreakerResponse"

  /ai/icebreaker-suggestions:
    post:
      operationId: generateIcebreakerSuggestions
      tags: [ai]
      summary: Generate 3 icebreaker chip suggestions for a chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcebreakerInput"
      responses:
        "200":
          description: 3 suggestion chips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcebreakerSuggestionsResponse"

  /ai/squad-pitch:
    post:
      operationId: generateSquadPitch
      tags: [ai]
      summary: Generate a personalized squad invitation message for a recipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SquadPitchInput"
      responses:
        "200":
          description: Generated squad pitch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SquadPitchResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    CommunityZone:
      type: string
      enum: [career, startup, study, social, creative, fitness, research]

    Timeframe:
      type: string
      enum: [now, soon, later]

    EnergyLevel:
      type: string
      enum: [browsing, exploring, building]

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        college:
          type: string
        major:
          type: string
        intent:
          type: string
        timeframe:
          $ref: "#/components/schemas/Timeframe"
        energyLevel:
          $ref: "#/components/schemas/EnergyLevel"
        zone:
          $ref: "#/components/schemas/CommunityZone"
        avatarColor:
          type: string
        avatarUrl:
          type: string
          nullable: true
          description: Profile photo URL (real face)
        lookingFor:
          type: string
          nullable: true
          description: What kind of connection they want (cofounder, study buddy, mentor, friend, collab, event partner)
        skills:
          type: string
          nullable: true
          description: Comma-separated skill/interest tags
        availability:
          type: string
          nullable: true
          description: When they are free (mornings, evenings, weekends, late-nights)
        gender:
          type: string
          nullable: true
          enum: [he, she, null]
          description: Pronoun preference (he or she). Used to seed default profile photo.
        createdAt:
          type: string
      required: [id, name, college, major, intent, timeframe, energyLevel, zone, avatarColor, createdAt]

    CreateUserInput:
      type: object
      properties:
        name:
          type: string
        college:
          type: string
        major:
          type: string
        intent:
          type: string
          minLength: 3
        timeframe:
          $ref: "#/components/schemas/Timeframe"
        energyLevel:
          $ref: "#/components/schemas/EnergyLevel"
        zone:
          $ref: "#/components/schemas/CommunityZone"
        avatarUrl:
          type: string
          nullable: true
          description: Profile photo URL (data URL or remote)
        lookingFor:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        availability:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
          enum: [he, she, null]
      required: [name, college, major, intent, timeframe, energyLevel, zone]

    UpdateUserInput:
      type: object
      description: Partial user update. Any field present overrides; omitted fields are unchanged.
      properties:
        avatarUrl:
          type: string
          nullable: true
        lookingFor:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        availability:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
          enum: [he, she, null]
        intent:
          type: string

    Match:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        alignmentScore:
          type: number
          description: 0-100 likelihood of real interaction
        reason:
          type: string
          description: Why they align
        sharedSignals:
          type: array
          items:
            type: string
      required: [user, alignmentScore, reason, sharedSignals]

    Squad:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        purpose:
          type: string
        firstAction:
          type: string
        suggestedMeetup:
          type: string
        zone:
          $ref: "#/components/schemas/CommunityZone"
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        createdAt:
          type: string
      required: [id, name, purpose, firstAction, suggestedMeetup, zone, members, createdAt]

    JoinSquadInput:
      type: object
      properties:
        userId:
          type: string
      required: [userId]

    Signal:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
        zone:
          $ref: "#/components/schemas/CommunityZone"
        intensity:
          type: string
          enum: [low, medium, high]
        count:
          type: integer
        timeAgo:
          type: string
      required: [id, message, zone, intensity, count, timeAgo]

    ZoneActivity:
      type: object
      properties:
        zone:
          $ref: "#/components/schemas/CommunityZone"
        activeUsers:
          type: integer
        livingNow:
          type: integer
          description: Users with timeframe=now
        squads:
          type: integer
        trendDirection:
          type: string
          enum: [up, steady, down]
      required: [zone, activeUsers, livingNow, squads, trendDirection]

    TrendingActivity:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
        zone:
          $ref: "#/components/schemas/CommunityZone"
      required: [label, count, zone]

    CommunityInsights:
      type: object
      properties:
        trendingActivities:
          type: array
          items:
            $ref: "#/components/schemas/TrendingActivity"
        mostActiveZones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneActivity"
        commonNeeds:
          type: array
          items:
            type: string
        totalActiveNow:
          type: integer
      required: [trendingActivities, mostActiveZones, commonNeeds, totalActiveNow]

    FomoTrigger:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
        urgency:
          type: string
          enum: [subtle, medium, high]
        relatedZone:
          $ref: "#/components/schemas/CommunityZone"
      required: [id, message, urgency, relatedZone]

    Message:
      type: object
      properties:
        id:
          type: string
        fromUserId:
          type: string
        toUserId:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required: [id, fromUserId, toUserId, content, createdAt]

    SendMessageInput:
      type: object
      properties:
        fromUserId:
          type: string
        toUserId:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 2000
      required: [fromUserId, toUserId, content]

    MessageThread:
      type: object
      properties:
        otherUser:
          $ref: "#/components/schemas/User"
        lastMessage:
          $ref: "#/components/schemas/Message"
        unread:
          type: boolean
      required: [otherUser, lastMessage, unread]

    CampusEvent:
      type: object
      properties:
        id:
          type: string
        college:
          type: string
        title:
          type: string
        description:
          type: string
        zone:
          $ref: "#/components/schemas/CommunityZone"
        location:
          type: string
        startsAt:
          type: string
        host:
          $ref: "#/components/schemas/User"
        attendees:
          type: array
          items:
            $ref: "#/components/schemas/User"
        attendeeCount:
          type: integer
        isAttending:
          type: boolean
        createdAt:
          type: string
      required:
        [id, college, title, description, zone, location, startsAt, attendees, attendeeCount, isAttending, createdAt]

    CreateEventInput:
      type: object
      properties:
        hostUserId:
          type: string
        title:
          type: string
          minLength: 3
        description:
          type: string
          minLength: 3
        zone:
          $ref: "#/components/schemas/CommunityZone"
        location:
          type: string
          minLength: 2
        startsAt:
          type: string
      required: [hostUserId, title, description, zone, location, startsAt]

    RsvpInput:
      type: object
      properties:
        userId:
          type: string
      required: [userId]

    MajorHub:
      type: object
      properties:
        major:
          type: string
        college:
          type: string
        peers:
          type: array
          items:
            $ref: "#/components/schemas/User"
        zoneBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ZoneActivity"
        topIntents:
          type: array
          items:
            type: string
      required: [major, peers, zoneBreakdown, topIntents]

    CollegeSnapshot:
      type: object
      properties:
        college:
          type: string
        totalActive:
          type: integer
        livingNow:
          type: integer
        squads:
          type: integer
        upcomingEvents:
          type: array
          items:
            $ref: "#/components/schemas/CampusEvent"
        topMajors:
          type: array
          items:
            $ref: "#/components/schemas/MajorCount"
      required: [college, totalActive, livingNow, squads, upcomingEvents, topMajors]

    MajorCount:
      type: object
      properties:
        major:
          type: string
        count:
          type: integer
      required: [major, count]

    Post:
      type: object
      properties:
        id:
          type: string
        author:
          $ref: "#/components/schemas/User"
        zone:
          $ref: "#/components/schemas/CommunityZone"
        body:
          type: string
        activityTag:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        reactionCount:
          type: integer
        joinCount:
          type: integer
        reactorIds:
          type: array
          items:
            type: string
        joinerIds:
          type: array
          items:
            type: string
        joiners:
          type: array
          items:
            $ref: "#/components/schemas/User"
        createdAt:
          type: string
      required:
        [id, author, zone, body, reactionCount, joinCount, reactorIds, joinerIds, joiners, createdAt]

    CreatePostInput:
      type: object
      properties:
        authorId:
          type: string
        zone:
          $ref: "#/components/schemas/CommunityZone"
        body:
          type: string
          minLength: 1
          maxLength: 500
        activityTag:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required: [authorId, zone, body]

    ReactionInput:
      type: object
      properties:
        userId:
          type: string
        kind:
          type: string
          enum: [fire, heart, clap]
      required: [userId, kind]

    JoinInput:
      type: object
      properties:
        userId:
          type: string
      required: [userId]

    IcebreakerInput:
      type: object
      properties:
        meId:
          type: string
        otherId:
          type: string
      required: [meId, otherId]

    IcebreakerResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    IcebreakerSuggestionsResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: string
      required: [suggestions]

    SquadPitchInput:
      type: object
      properties:
        fromUserId:
          type: string
        toUserId:
          type: string
        squadIntent:
          type: string
      required: [fromUserId, toUserId, squadIntent]

    SquadPitchResponse:
      type: object
